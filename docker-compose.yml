services:
  postgres:
    image: postgres:16-alpine
    container_name: taskmanager-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: taskmanager
      POSTGRES_PASSWORD: taskmanager
      POSTGRES_DB: taskmanager
    ports:
      - "5433:5432"
    volumes:
      - taskmanager_pg_data:/var/lib/postgresql/data

volumes:
  taskmanager_pg_data:
